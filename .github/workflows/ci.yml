name: voltneuron-grid-ci

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  build-and-gates:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cargo check runtime
        run: cargo check -p voltnuerongridd

      - name: Cargo test SQL baseline
        run: cargo test -p voltnuerongrid-sql

      - name: Validate R1 gate checklist artifact
        shell: pwsh
        run: ./tests/kpi/scripts/check-r1-gate.ps1 -RepoRoot "." -OutputPath "./tests/kpi/results/gates/ci-r1-gate-check.json"

      - name: Runtime smoke for SQL analyze API
        shell: bash
        run: |
          set -euo pipefail
          cargo run -p voltnuerongridd > /tmp/voltnuerongridd.log 2>&1 &
          RUNTIME_PID=$!
          cleanup() {
            kill "${RUNTIME_PID}" >/dev/null 2>&1 || true
          }
          trap cleanup EXIT
          for _ in {1..30}; do
            if curl -fsS "http://127.0.0.1:8080/health" >/dev/null 2>&1; then
              break
            fi
            sleep 2
          done
          curl -fsS "http://127.0.0.1:8080/health" >/dev/null
          pwsh ./tests/kpi/scripts/run-sql-analyze-smoke.ps1 -BaseUrl "http://127.0.0.1:8080" -OutputPath "./tests/kpi/results/ws1/ci-sql-analyze-smoke.json"
          pwsh ./tests/kpi/scripts/run-sql-execute-udf-smoke.ps1 -BaseUrl "http://127.0.0.1:8080" -OutputPath "./tests/kpi/results/ws1/ci-sql-execute-udf-smoke.json"

      - name: Run phase-3 bootstrap in deferred-safe mode
        shell: pwsh
        run: ./tests/kpi/scripts/bootstrap-phase3.ps1 -LocalBaselineRoot "./tests/kpi/results/20260304-pr007"

      - name: Run WS13 cloud deployment gate
        shell: pwsh
        run: ./tests/kpi/scripts/run-ws13-gate.ps1 -OutputPath "./tests/kpi/results/ws13/ci-ws13-gate-summary.json"

      - name: Run WS14 config hardening gate
        shell: pwsh
        run: ./tests/kpi/scripts/run-ws14-gate.ps1 -OutputPath "./tests/kpi/results/ws14/ci-ws14-gate-summary.json"

      - name: Run WS5 security gate
        shell: pwsh
        run: ./tests/kpi/scripts/run-ws5-gate.ps1 -OutputPath "./tests/kpi/results/gates/ci-ws5-gate-summary.json"

      - name: Build WS5 gate badge artifact
        shell: pwsh
        run: ./tests/kpi/scripts/run-ws5-gate-badge.ps1 -SummaryPath "./tests/kpi/results/gates/ci-ws5-gate-summary.json" -OutputPath "./tests/kpi/results/gates/ci-ws5-gate-badge.json"

      - name: Run WS9 Studio API gate
        shell: pwsh
        run: ./tests/kpi/scripts/run-ws9-gate.ps1 -OutputPath "./tests/kpi/results/ws9/ci-ws9-gate-summary.json"

      - name: Run WS9A IDE extension gate
        shell: pwsh
        run: ./tests/kpi/scripts/run-ws9a-gate.ps1 -OutputPath "./tests/kpi/results/ws9a/ci-ws9a-gate-summary.json"

      - name: Run release DX/API contract cluster gate
        shell: pwsh
        run: ./tests/kpi/scripts/run-release-dx-api-gate.ps1 -OutputPath "./tests/kpi/results/gates/ci-release-dx-api-readiness.json"

      - name: Run release Ops/Resilience cluster gate
        shell: pwsh
        run: ./tests/kpi/scripts/run-release-ops-resilience-gate.ps1 -OutputPath "./tests/kpi/results/gates/ci-release-ops-resilience-readiness.json"

      - name: Run WS10 driver and pooling gate
        shell: pwsh
        run: ./tests/kpi/scripts/run-ws10-gate.ps1 -OutputPath "./tests/kpi/results/ws10/ci-ws10-gate-summary.json"

      - name: Run WS11 i18n and UTF-8 gate
        shell: pwsh
        run: ./tests/kpi/scripts/run-ws11-gate.ps1 -OutputPath "./tests/kpi/results/ws11/ci-ws11-gate-summary.json"

      - name: Run WS22 pessimistic locking gate
        shell: pwsh
        run: ./tests/kpi/scripts/run-ws22-gate.ps1 -OutputPath "./tests/kpi/results/ws22/ci-ws22-gate-summary.json" -ReleaseSummaryOutputPath "./tests/kpi/results/gates/ci-ws22-release-readiness.json"

      - name: Build WS22 pessimistic-lock stability badge artifact
        shell: pwsh
        run: ./tests/kpi/scripts/run-ws22-pessimistic-lock-stability-badge.ps1 -SummaryPath "./tests/kpi/results/ws22/ci-ws22-gate-summary.json" -TrendPath "./tests/kpi/results/ws22/ws22-gate-trend-comparison.json" -OutputPath "./tests/kpi/results/gates/ci-ws22-pessimistic-lock-stability-badge.json"

      - name: Run WS22 closure gate
        shell: pwsh
        run: ./tests/kpi/scripts/run-ws22-closure-gate.ps1 -OutputPath "./tests/kpi/results/ws22/ci-ws22-closure-gate-summary.json"

      - name: Run WS15 competitive adoption gate
        shell: pwsh
        run: ./tests/kpi/scripts/run-ws15-gate.ps1 -OutputPath "./tests/kpi/results/ws15/ci-ws15-gate-summary.json"

      - name: Run WS1 SQL core gate
        shell: pwsh
        run: ./tests/kpi/scripts/run-ws1-gate.ps1 -OutputPath "./tests/kpi/results/ws1/ci-ws1-gate-summary.json" -ReleaseSummaryOutputPath "./tests/kpi/results/gates/ci-ws1-release-readiness.json"

      - name: Build WS1 UDF stability badge artifact
        shell: pwsh
        run: ./tests/kpi/scripts/run-ws1-udf-stability-badge.ps1 -SummaryPath "./tests/kpi/results/ws1/ci-ws1-gate-summary.json" -TrendPath "./tests/kpi/results/ws1/ws1-gate-trend-comparison.json" -OutputPath "./tests/kpi/results/gates/ci-ws1-udf-stability-badge.json"

      - name: Run WS1 closure gate
        shell: pwsh
        run: ./tests/kpi/scripts/run-ws1-closure-gate.ps1 -OutputPath "./tests/kpi/results/ws1/ci-ws1-closure-gate-summary.json"

      - name: Run release R1 SQL/UDF/locking readiness gate
        shell: pwsh
        run: ./tests/kpi/scripts/run-release-r1-sql-udf-gate.ps1 -OutputPath "./tests/kpi/results/gates/ci-release-r1-sql-udf-readiness.json"

      - name: Run WS1A parity gate
        shell: pwsh
        run: ./tests/kpi/scripts/run-ws1a-gate.ps1 -OutputPath "./tests/kpi/results/ws1a/ci-ws1a-gate-summary.json"

      - name: Run WS2 storage durability gate
        shell: pwsh
        run: ./tests/kpi/scripts/run-ws2-gate.ps1 -OutputPath "./tests/kpi/results/ws2/ci-ws2-gate-summary.json"

      - name: Run WS2A row-store sync-origin gate
        shell: pwsh
        run: ./tests/kpi/scripts/run-ws2a-gate.ps1 -OutputPath "./tests/kpi/results/ws2a/ci-ws2a-gate-summary.json"

      - name: Run WS3 query routing gate
        shell: pwsh
        run: ./tests/kpi/scripts/run-ws3-gate.ps1 -OutputPath "./tests/kpi/results/ws3/ci-ws3-gate-summary.json" -ReleaseSummaryOutputPath "./tests/kpi/results/gates/ci-ws3-release-readiness.json"

      - name: Build WS3 performance stability badge artifact
        shell: pwsh
        run: ./tests/kpi/scripts/run-ws3-performance-stability-badge.ps1 -SummaryPath "./tests/kpi/results/ws3/ci-ws3-gate-summary.json" -TrendPath "./tests/kpi/results/ws3/ws3-gate-trend-comparison.json" -OutputPath "./tests/kpi/results/gates/ci-ws3-performance-stability-badge.json"

      - name: Run WS4 ingest gate
        shell: pwsh
        run: ./tests/kpi/scripts/run-ws4-gate.ps1 -OutputPath "./tests/kpi/results/ws4/ci-ws4-gate-summary.json"

      - name: Run WS4A streaming/eventing gate
        shell: pwsh
        run: ./tests/kpi/scripts/run-ws4a-gate.ps1 -OutputPath "./tests/kpi/results/ws4a/ci-ws4a-gate-summary.json"

      - name: Run WS6 distributed failover gate
        shell: pwsh
        run: ./tests/kpi/scripts/run-ws6-gate.ps1 -OutputPath "./tests/kpi/results/ws6/ci-ws6-gate-summary.json" -ReleaseSummaryOutputPath "./tests/kpi/results/gates/ci-ws6-release-readiness.json"

      - name: Build WS6 failover stability badge artifact
        shell: pwsh
        run: ./tests/kpi/scripts/run-ws6-failover-stability-badge.ps1 -SummaryPath "./tests/kpi/results/ws6/ci-ws6-gate-summary.json" -TrendPath "./tests/kpi/results/ws6/ws6-gate-trend-comparison.json" -OutputPath "./tests/kpi/results/gates/ci-ws6-failover-stability-badge.json"

      - name: Run WS6 closure gate
        shell: pwsh
        run: ./tests/kpi/scripts/run-ws6-closure-gate.ps1 -OutputPath "./tests/kpi/results/ws6/ci-ws6-closure-gate-summary.json"

      - name: Run release R2 failover readiness gate
        shell: pwsh
        run: ./tests/kpi/scripts/run-release-r2-failover-gate.ps1 -OutputPath "./tests/kpi/results/gates/ci-release-r2-failover-readiness.json"

      - name: Run WS7 plugin gate
        shell: pwsh
        run: ./tests/kpi/scripts/run-ws7-gate.ps1 -OutputPath "./tests/kpi/results/ws7/ci-ws7-gate-summary.json" -ReleaseSummaryOutputPath "./tests/kpi/results/gates/ci-ws7-release-readiness.json"

      - name: Build WS7 plugin stability badge artifact
        shell: pwsh
        run: ./tests/kpi/scripts/run-ws7-plugin-stability-badge.ps1 -SummaryPath "./tests/kpi/results/ws7/ci-ws7-gate-summary.json" -TrendPath "./tests/kpi/results/ws7/ws7-gate-trend-comparison.json" -OutputPath "./tests/kpi/results/gates/ci-ws7-plugin-stability-badge.json"

      - name: Run WS7 closure gate
        shell: pwsh
        run: ./tests/kpi/scripts/run-ws7-closure-gate.ps1 -OutputPath "./tests/kpi/results/ws7/ci-ws7-closure-gate-summary.json"

      - name: Run WS8 autonomous control-plane gate
        shell: pwsh
        run: ./tests/kpi/scripts/run-ws8-gate.ps1 -OutputPath "./tests/kpi/results/ws8/ci-ws8-gate-summary.json" -ReleaseSummaryOutputPath "./tests/kpi/results/gates/ci-ws8-release-readiness.json"

      - name: Build WS8 autonomy stability badge artifact
        shell: pwsh
        run: ./tests/kpi/scripts/run-ws8-autonomy-stability-badge.ps1 -SummaryPath "./tests/kpi/results/ws8/ci-ws8-gate-summary.json" -TrendPath "./tests/kpi/results/ws8/ws8-gate-trend-comparison.json" -OutputPath "./tests/kpi/results/gates/ci-ws8-autonomy-stability-badge.json"

      - name: Run WS8 closure gate
        shell: pwsh
        run: ./tests/kpi/scripts/run-ws8-closure-gate.ps1 -OutputPath "./tests/kpi/results/ws8/ci-ws8-closure-gate-summary.json"

      - name: Run WS8A agent authoring gate
        shell: pwsh
        run: ./tests/kpi/scripts/run-ws8a-gate.ps1 -OutputPath "./tests/kpi/results/ws8a/ci-ws8a-gate-summary.json" -ReleaseSummaryOutputPath "./tests/kpi/results/gates/ci-ws8a-release-readiness.json"

      - name: Build WS8A agent stability badge artifact
        shell: pwsh
        run: ./tests/kpi/scripts/run-ws8a-agent-stability-badge.ps1 -SummaryPath "./tests/kpi/results/ws8a/ci-ws8a-gate-summary.json" -TrendPath "./tests/kpi/results/ws8a/ws8a-gate-trend-comparison.json" -OutputPath "./tests/kpi/results/gates/ci-ws8a-agent-stability-badge.json"

      - name: Run WS8A closure gate
        shell: pwsh
        run: ./tests/kpi/scripts/run-ws8a-closure-gate.ps1 -OutputPath "./tests/kpi/results/ws8a/ci-ws8a-closure-gate-summary.json"

      - name: Run release R3 agent authoring readiness gate
        shell: pwsh
        run: ./tests/kpi/scripts/run-release-r3-agent-authoring-gate.ps1 -OutputPath "./tests/kpi/results/gates/ci-release-r3-agent-authoring-readiness.json"

      - name: Run release R3 autonomous readiness gate
        shell: pwsh
        run: ./tests/kpi/scripts/run-release-r3-autonomous-gate.ps1 -OutputPath "./tests/kpi/results/gates/ci-release-r3-autonomous-readiness.json"

      - name: Run release R3 UDF runtime readiness gate
        shell: pwsh
        run: ./tests/kpi/scripts/run-release-r3-udf-runtime-gate.ps1 -OutputPath "./tests/kpi/results/gates/ci-release-r3-udf-runtime-readiness.json"

      - name: Run release R3 plugin readiness gate
        shell: pwsh
        run: ./tests/kpi/scripts/run-release-r3-plugin-gate.ps1 -OutputPath "./tests/kpi/results/gates/ci-release-r3-plugin-readiness.json"

      - name: Upload gate artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ci-gate-artifacts
          path: |
            tests/kpi/results/gates/ci-r1-gate-check.json
            tests/kpi/results/ws1/ci-sql-analyze-smoke.json
            tests/kpi/results/ws1/ci-sql-execute-udf-smoke.json
            tests/kpi/results/ws13/ci-ws13-gate-summary.json
            tests/kpi/results/ws14/ci-ws14-gate-summary.json
