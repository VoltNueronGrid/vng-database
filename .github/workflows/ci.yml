name: voltneuron-grid-ci

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  build-and-gates:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cargo check runtime
        run: cargo check -p voltnuerongridd

      - name: Cargo test SQL baseline
        run: cargo test -p voltnuerongrid-sql

      - name: Validate R1 gate checklist artifact
        shell: pwsh
        run: ./tests/kpi/scripts/check-r1-gate.ps1 -RepoRoot "." -OutputPath "./tests/kpi/results/gates/ci-r1-gate-check.json"

      - name: Runtime smoke for SQL analyze API
        shell: bash
        run: |
          set -euo pipefail
          cargo run -p voltnuerongridd > /tmp/voltnuerongridd.log 2>&1 &
          RUNTIME_PID=$!
          cleanup() {
            kill "${RUNTIME_PID}" >/dev/null 2>&1 || true
          }
          trap cleanup EXIT
          sleep 5
          pwsh ./tests/kpi/scripts/run-sql-analyze-smoke.ps1 -BaseUrl "http://127.0.0.1:8080" -OutputPath "./tests/kpi/results/ws1/ci-sql-analyze-smoke.json"

      - name: Run phase-3 bootstrap in deferred-safe mode
        shell: pwsh
        run: ./tests/kpi/scripts/bootstrap-phase3.ps1 -LocalBaselineRoot "./tests/kpi/results/20260304-pr007"
